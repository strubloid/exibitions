server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Frontend — serve React build, fallback to index.html for SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API — proxy to Laravel on localhost:8000
    location /api {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_redirect off;
    }
}
